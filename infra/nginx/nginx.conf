# ─────────────────────────────────────────────────────────────────────────────
# NIDS — Nginx Reverse Proxy Configuration
# infra/nginx/nginx.conf
#
# Routing rules:
#   /api/*        → backend (Node.js :5000)  — REST endpoints
#   /socket.io/*  → backend (Node.js :5000)  — WebSocket / Socket.io
#   /*            → frontend (React   :3000)  — SPA catch-all
# ─────────────────────────────────────────────────────────────────────────────

# ── Worker settings ──────────────────────────────────────────────────────────
worker_processes auto;                 # one worker per CPU core
worker_rlimit_nofile 8192;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {

  # ── MIME types & defaults ─────────────────────────────────────────────────
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens off;                   # hide Nginx version from response headers

  # ── Gzip compression ──────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   5;
  gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/x-javascript text/xml application/xml
    application/xml+rss text/javascript image/svg+xml;

  # ── WebSocket upgrade map ─────────────────────────────────────────────────
  # Allows Nginx to correctly forward the Upgrade header for Socket.io.
  # If the request has "Upgrade: websocket", $connection_upgrade → "upgrade"
  # Otherwise it falls back to "close" (standard HTTP keep-alive behaviour).
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
  }

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log  warn;

  # ── Upstream definitions ──────────────────────────────────────────────────
  upstream backend {
    server backend:5000;               # Docker service name → internal DNS
    keepalive 32;                      # keep connections warm to the backend
  }

  upstream frontend {
    server frontend:3000;              # Docker service name → internal DNS
  }

  # ── Common proxy headers (reused in location blocks) ─────────────────────
  # Defined here as a snippet to avoid repetition.
  # Nginx doesn't support include inside location, so we define a map instead
  # and set them inline per block below.

  # ─────────────────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;                     # matches any hostname / bare IP

    # Max body size — allow large .pcap uploads to the API
    client_max_body_size 512M;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"       always;
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin"    always;

    # ── /api/* → Backend REST API ─────────────────────────────────────────
    location /api/ {
      proxy_pass         http://backend;   # trailing slash strips /api prefix
                                           # → backend receives /api/... intact
      proxy_http_version 1.1;

      # Standard forwarding headers
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Disable buffering for streaming / SSE responses
      proxy_buffering    off;
      proxy_read_timeout 300s;           # long timeout for capture sessions
    }

    # ── /socket.io/* → Backend WebSocket (Socket.io) ─────────────────────
    # Must be a separate block because WebSocket upgrades require special
    # Upgrade and Connection headers that differ from plain HTTP proxying.
    location /socket.io/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;

      # WebSocket handshake headers
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;

      # Standard forwarding headers
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Keep WebSocket connections alive
      proxy_read_timeout  3600s;         # 1 hour — long-lived WS connections
      proxy_send_timeout  3600s;
      proxy_buffering     off;
    }

    # ── /* → React Frontend (SPA catch-all) ───────────────────────────────
    # This MUST come last — it is the most generic location.
    # The @fallback named location handles the SPA's client-side routing:
    # if the file doesn't exist on the upstream, Nginx returns the index.html
    # so React Router can take over.
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;

      # Required for Vite's HMR (Hot Module Replacement) WebSocket in dev
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;

      # Standard forwarding headers
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_buffering    off;
      proxy_read_timeout 60s;
    }

    # ── Health check endpoint (used by Docker / load balancers) ──────────
    location = /health {
      access_log off;
      return 200 "nginx ok\n";
      add_header Content-Type text/plain;
    }
  }

  # ─────────────────────────────────────────────────────────────────────────
  # TLS / HTTPS server block (disabled by default)
  # Uncomment when certificates are available and update docker-compose.yml
  # to expose port 443.
  # ─────────────────────────────────────────────────────────────────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name your-domain.com;
  #
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #
  #   # ... same location blocks as above ...
  # }
  #
  # Redirect HTTP → HTTPS
  # server {
  #   listen 80;
  #   server_name your-domain.com;
  #   return 301 https://$host$request_uri;
  # }
}
